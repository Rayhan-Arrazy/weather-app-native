<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atmosphere Fluid</title>
    <link rel="stylesheet" href="style-blue.css">
</head>

<body>

    <div class="fluid-wrapper" id="root-theme">

        <div class="blob-cont">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
        </div>

        <main class="app-shell">

            <header class="search-region">
                <input type="text" id="city-search" placeholder="Type a city...">
                <button id="search-trigger">
                    <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 16 16" height="1em"
                        width="1em" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z">
                        </path>
                    </svg>
                </button>
            </header>

            <section id="weather-view" class="weather-results view-hidden">
                <div class="main-info">
                    <h2 id="display-city">City</h2>
                    <div id="icon-wrap"></div>
                    <p id="fluid-context">Analyzing...</p>
                </div>

                <div class="data-grid">
                    <div class="data-block">
                        <span id="display-temp">--</span>
                        <small>Temperature</small>
                    </div>
                    <div class="data-block">
                        <span id="display-cond">--</span>
                        <small>Condition</small>
                    </div>
                    <div class="data-block">
                        <span id="display-wind">--</span>
                        <small>Wind (km/h)</small>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script src="script-blue.js"></script>
</body>

</html>
