<!DOCTYPE html>

    <meta charset="UTF-8">

    <title>WETHR</title>
    <link rel="stylesheet" href="style.css">
</head>
<!-- satu desain aja persis, tapi dibikin tailwindnya juga -->

<body>
    <div class="card">
        <div class="search">
            <input type="text" id="search-bar" placeholder="Enter city name...">
            <button id="search-btn" class="btn">Search</button>
        </div>

        <!-- SEARCH THE CITY -->
        <div class="weather loading">
            <h2 class="city" id="city">FIND YOUR CITY HERE!</h2>
            <h2 class="temp" id="temp"></h2>
            <div class="description" id="desc"></div>
            <div class="humidity" id="humidity"></div>
        </div>
